<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%234f46e5' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><rect x='3' y='11' width='18' height='11' rx='2'/><path d='M7 11V7a5 5 0 0110 0v4'/></svg>" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="AuthApp - Secure authentication with email sign-up, OAuth, encrypted passwords, and database sessions." />
		<meta name="theme-color" content="#4f46e5" />
		<meta property="og:title" content="AuthApp - Secure Authentication" />
		<meta property="og:description" content="Protect your users with enterprise-grade security. Email sign-up, encrypted passwords, and persistent database sessions." />
		<meta property="og:type" content="website" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<script>
			(function() {
				var t = localStorage.getItem('theme');
				var isDark = t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches);
				if (isDark) {
					document.documentElement.classList.add('dark');
				} else {
					document.documentElement.classList.remove('dark');
				}
			})();
		</script>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
